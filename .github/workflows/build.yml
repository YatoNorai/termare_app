name: Build & Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set Up Java 11 (Temurin)
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '11'
          cache: 'gradle'

      - name: Set Up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.0.0'
          channel: 'stable'

      - name: Install Dependencies
        run: flutter pub get

      - name: Build APK Debug
        run: flutter build apk --debug

      - name: Show build outputs & find apk
        id: find_apk
        run: |
          echo "Listing build outputs..."
          ls -la build/app/outputs || true
          echo "Finding apk(s)..."
          APK_PATH=$(find build -type f -name "*.apk" | head -n 1 || true)
          if [ -z "$APK_PATH" ]; then
            echo "No APK found!"
            exit 1
          fi
          echo "APK found: $APK_PATH"
          echo "APK_PATH=$APK_PATH" >> $GITHUB_ENV
          echo "::set-output name=apk_path::$APK_PATH"

      - name: Extract Version
        id: extract_version
        run: |
          version=$(grep '^version: ' pubspec.yaml | cut -d ' ' -f 2)
          echo "ORIG_VERSION=$version" >> $GITHUB_ENV

      - name: Get Latest Git Tag
        id: latest_tag
        uses: actions-ecosystem/action-get-latest-tag@v1
        with:
          tag_prefix: 'v'

      - name: Compute Next Version
        id: bump_version
        run: |
          if [ -z "${{ steps.latest_tag.outputs.latest }}" ]; then
            next=${ORIG_VERSION}
          else
            latest=${{ steps.latest_tag.outputs.latest }}
            next=$(echo "$latest" | awk -F'\\+|\\.' '{
              OFS=".";
              n=split($0,a,/\\+/);
              a[n]=a[n]+1;
              print a[1]"."a[2]"."a[3]"+"a[4];
            }')
          fi
          echo "NEXT_VERSION=$next" >> $GITHUB_ENV
          echo "Computed next version: $next"

      - name: Check Release Existence
        id: check_release
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const tag = `v${process.env.NEXT_VERSION}`;
            try {
              const release = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag,
              });
              core.setOutput('exists', 'true');
              core.setOutput('upload_url', release.data.upload_url);
            } catch (error) {
              if (error.status === 404) {
                core.setOutput('exists', 'false');
              } else {
                throw error;
              }
            }

      - name: Create Release (if not exists)
        if: steps.check_release.outputs.exists == 'false'
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ env.NEXT_VERSION }}
          release_name: Debug v${{ env.NEXT_VERSION }}
          draft: false
          prerelease: true

      # set upload_url: if we created the release use its output, otherwise use the one fetched earlier
      - name: Resolve upload_url
        id: resolve_upload
        run: |
          if [ "${{ steps.check_release.outputs.exists }}" = "false" ]; then
            echo "Uploading to newly created release..."
            # create_release outputs.upload_url (action/create-release@v1)
            UPLOAD_URL="${{ steps.create_release.outputs.upload_url }}"
          else
            echo "Using existing release upload_url from check_release..."
            UPLOAD_URL="${{ steps.check_release.outputs.upload_url }}"
          fi
          echo "UPLOAD_URL=$UPLOAD_URL" >> $GITHUB_ENV

      - name: Upload APK
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ env.UPLOAD_URL }}
          asset_path: ${{ env.APK_PATH }}
          asset_name: app-debug-${{ env.NEXT_VERSION }}.apk
          asset_content_type: application/vnd.android.package-archive
